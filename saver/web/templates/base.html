<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Saver{% endblock %} — Financial Wellness Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        grab: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#00b14f', 600: '#00913f', 700: '#007a35' }
                    }
                }
            }
        }
    </script>
    <style>
        .chat-bubble-user { background: #00b14f; color: white; border-radius: 18px 18px 4px 18px; }
        .chat-bubble-bot { background: #f3f4f6; color: #1f2937; border-radius: 18px 18px 18px 4px; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dots span { animation: blink 1.4s infinite both; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body class="h-full">
    {% if request.session.get('user_id') %}
    <nav class="bg-grab-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard" class="text-white text-xl font-bold">Saver</a>
                    <a href="/dashboard" class="text-green-100 hover:text-white text-sm font-medium {% if request.url.path == '/dashboard' %}text-white underline{% endif %}">Dashboard</a>
                    <a href="/chat" class="text-green-100 hover:text-white text-sm font-medium {% if request.url.path == '/chat' %}text-white underline{% endif %}">Chat</a>
                    <a href="/goals" class="text-green-100 hover:text-white text-sm font-medium {% if request.url.path == '/goals' %}text-white underline{% endif %}">Goals</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-green-200 text-sm">{{ request.session.get('user_name', '') }}</span>
                    <a href="/logout" class="text-green-100 hover:text-white text-sm">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="{% if request.session.get('user_id') %}max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6{% endif %}">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
